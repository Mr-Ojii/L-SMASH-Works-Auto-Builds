name: Build L-SMASH Works

on:
  push:
    branches:
      - feature/redesign
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true



# 具体的なワークフローはこう
# job 1. すべての依存ライブラリをクローン
  # 1-1. build, pub, pub/Licenses ディレクトリを作成
  # 1-2. 各種依存ライブラリを build ディレクトリにクローンし、rev-count, shaを取得しながら、Licenses ディレクトリにライセンステキストを配置
  # 1-3. pub/About-this-build.txt に rev-count, sha を記載
  # 1-4. pub ディレクトリを Assets としてアップロード | docs-<LSW-Author>-<L-SMASH-Author> キーでアップロード
  # 1-5. build ディレクトリを Assets としてアップロード | build-<LSW-Author>-<L-SMASH-Author> キーでアップロード
# job 2. Ubuntu 環境で L-SMASH Worksをビルド (AvuUtl, AviUtl ExEdit2, VapourSynth)
  # 2-1. build-<LSW-Author>-<L-SMASH-Author> のAssetsをダウンロードし、ビルドに必要なファイルを配置
  # 2-2. pub ディレクトリを作成
  # 2-3. L-SMASH Worksをビルドし、ビルドしたファイルを pub/<HostApp>/<CpuArch> に配置
  # 2-4. pub ディレクトリを、Assets としてアップロード | ubuntu-build-<LSW-Author>-<L-SMASH-Author>-<CpuArch> キーでアップロード
# job 3. Windows 環境で L-SMASH Worksをビルド (AviSynth)
  # 3-1. build-<LSW-Author>-<L-SMASH-Author> のAssetsをダウンロードし、ビルドに必要なファイルを配置
  # 3-2. pub ディレクトリを作成
  # 3-3. L-SMASH Worksをビルドし、ビルドしたファイルを pub/<HostApp>/<CpuArch> に配置
  # 3-4. pub ディレクトリを Assets としてアップロード | windows-build-<LSW-Author>-<L-SMASH-Author>-<CpuArch> キーでアップロード
# job 4. Ubuntu, Windows 環境でビルドしたファイルをダウンロードし、x86とx64のファイルをまとめて1つのzipにする
  # 4-1. ubuntu-build-<LSW-Author>-<L-SMASH-Author>-x86 と ubuntu-build-<LSW-Author>-<L-SMASH-Author>-x64, windows-build-<LSW-Author>-<L-SMASH-Author>-x86, windows-build-<LSW-Author>-<L-SMASH-Author>-x64 のAssetsをダウンロード
  # 4-2. ファイルをまとめて1つのzipにする (重要)
  # 4-3. zip にして、Assets としてアップロード | L-SMASH-Works-<LSW-Author>-<L-SMASH-Author> キーでアップロード
# job 5. zip にしたファイルを Release にアップロード
  # 5-1. すべての Assets をダウンロード
  # 5-2. Release を作成し、*.zip を Assets としてアップロード


# 現在の構成は以下
# - zlib
# - game-music-emu
# - dav1d
# - libvpx
# - nv-codec-headers
# - libvpl or mfx_dispatch
# - FFmpeg
# - obuparse
# - L-SMASH
# - AviSynthPlus
# - zimg
# - VapourSynth


jobs:
  # 1. すべての依存ライブラリをクローン
  clone:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        lsw_config:
          - { author: VFR-maniac, ffmpeg_version: "4.4", ffmpeg_patch: " (patched)", intel: "mfx", ffmpeg_extra_flags: "--enable-avresample" }
          - { author: Mr-Ojii, ffmpeg_version: "7.1", ffmpeg_patch: "", intel: "vpl", ffmpeg_extra_flags: ""}
        l-smash_author: [Mr-Ojii, vimeo]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Create build and pub Directory
      run: |
        cd ${{ github.workspace }}
        mkdir build
        mkdir pub
        mkdir pub/Licenses

    - name: Set git config
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Clone zlib
      id: zlib-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/madler/zlib.git --depth 1
        cd zlib

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone Game Music Emu
      id: game-music-emu-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/libgme/game-music-emu.git --depth 1
        cd game-music-emu

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone dav1d
      id: dav1d-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://code.videolan.org/videolan/dav1d.git --depth 1
        cd dav1d

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone libvpx
      id: libvpx-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/webmproject/libvpx.git --depth 1
        cd libvpx

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone nv-codec-headers
      id: nv-codec-headers-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/FFmpeg/nv-codec-headers.git --depth 1
        cd nv-codec-headers

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone mfx_dispatch
      if: ${{ matrix.lsw_config.intel == 'mfx' }}
      id: mfx_dispatch-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/lu-zero/mfx_dispatch.git --depth 1
        cd mfx_dispatch

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone libvpl
      if: ${{ matrix.lsw_config.intel == 'vpl' }}
      id: libvpl-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/intel/libvpl.git --depth 1
        cd libvpl

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone FFmpeg
      id: ffmpeg-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/FFmpeg/FFmpeg.git -b release/${{ matrix.lsw_config.ffmpeg_version }}
        cd FFmpeg

        # 文字が1文字以上存在すれば実行される
        if [ "${{ matrix.lsw_config.ffmpeg_patch }}" ]; then
          git cherry-pick 07bcedc232feeb9e30336624f4e9977d47ac43bc
        fi

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone obuparse
      id: obuparse-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/dwbuiten/obuparse.git --depth 1
        cd obuparse

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone L-SMASH
      id: l-smash-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/${{ matrix.l-smash_author }}/l-smash.git
        cd l-smash

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone AviSynthPlus
      id: avisynthplus-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/AviSynth/AviSynthPlus.git --depth 1 -b v3.7.3
        cd AviSynthPlus

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone zimg
      id: zimg-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/sekrit-twc/zimg -b v3.0 --depth 1
        cd zimg

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone VapourSynth
      id: vapoursynth-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/vapoursynth/vapoursynth -b R72 --depth 1
        cd vapoursynth

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Clone L-SMASH Works
      id: l-smash-works-rev
      run: |
        cd ${{ github.workspace }}/build
        git clone https://github.com/${{ matrix.lsw_config.author }}/L-SMASH-Works.git --depth 1
        cd L-SMASH-Works

        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    # BuildInfo File 周り
    - name: Set workflow Revision Info
      id: workflow-rev
      run: |
        cd ${{ github.workspace }}
        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Create BuildInfo File
      run: |
        cd ${{ github.workspace }}
        echo "L-SMASH-Works-Auto-Builds r${{ steps.workflow-rev.outputs.REV_LIST_COUNT }}
        https://github.com/Mr-Ojii/L-SMASH-Works-Auto-Builds

        ${{ matrix.lsw_config.author }}/L-SMASH-Works r${{ steps.l-smash-works-rev.outputs.REV_LIST_COUNT }}
        https://github.com/${{ matrix.lsw_config.author }}/L-SMASH-Works

        FFmpeg ${{ matrix.lsw_config.ffmpeg_version }}${{ matrix.lsw_config.ffmpeg_patch }}
        https://github.com/FFmpeg/FFmpeg

        ${{ matrix.l-smash_author }}/L-SMASH r${{ steps.l-smash-rev.outputs.REV_LIST_COUNT }}
        https://github.com/${{ matrix.l-smash_author }}/l-smash

        dav1d ${{ steps.dav1d-rev.outputs.REV_SHA }}
        https://github.com/videolan/dav1d

        libvpx ${{ steps.libvpx-rev.outputs.REV_SHA }}
        https://github.com/webmproject/libvpx

        nv-codec-headers ${{ steps.nv-codec-headers-rev.outputs.REV_SHA }}
        https://github.com/FFmpeg/nv-codec-headers

        zlib ${{ steps.zlib-rev.outputs.REV_SHA }}
        https://github.com/madler/zlib

        obuparse ${{ steps.obuparse-rev.outputs.REV_SHA }}
        https://github.com/dwbuiten/obuparse

        game-music-emu ${{ steps.game-music-emu-rev.outputs.REV_SHA }}
        https://github.com/libgme/game-music-emu

        AviSynthPlus ${{ steps.avisynthplus-rev.outputs.REV_SHA }}
        https://github.com/AviSynth/AviSynthPlus

        zimg ${{ steps.zimg-rev.outputs.REV_SHA }}
        https://github.com/sekrit-twc/zimg

        VapourSynth ${{ steps.vapoursynth-rev.outputs.REV_SHA }}
        https://github.com/vapoursynth/vapoursynth

        " >> "pub/About-this-build.txt"

        if [ "${{ matrix.lsw_config.intel }}" == "mfx" ]; then

        echo "mfx_dispatch ${{ steps.mfx_dispatch-rev.outputs.REV_SHA }}
        https://github.com/lu-zero/mfx_dispatch" >> "pub/About-this-build.txt"

        else

        echo "libvpl ${{ steps.libvpl-rev.outputs.REV_SHA }}
        https://github.com/intel/libvpl" >> "pub/About-this-build.txt"

        fi

    - name: Add License Files
      run: |
        cd ${{ github.workspace }}/pub/Licenses
        cp ${{ github.workspace }}/build/dav1d/COPYING dav1d.txt
        cp ${{ github.workspace }}/build/l-smash/LICENSE L-SMASH.txt
        cp ${{ github.workspace }}/build/FFmpeg/COPYING.LGPLv3 FFmpeg.txt
        cp ${{ github.workspace }}/build/libvpx/LICENSE libvpx.txt
        cp ${{ github.workspace }}/build/obuparse/LICENSE obuparse.txt
        cp ${{ github.workspace }}/build/game-music-emu/license.txt game-music-emu.txt
        cp ${{ github.workspace }}/build/zimg/COPYING zimg.txt

        if [ "${{ matrix.lsw_config.intel }}" == "mfx" ]; then
          cp ${{ github.workspace }}/build/mfx_dispatch/LICENSE mfx_dispatch.txt
        else
          cp ${{ github.workspace }}/build/libvpl/LICENSE libvpl.txt
        fi
        echo "[InternetShortcut]" > zlib.url
        echo "URL=https://zlib.net/zlib_license.html" >> zlib.url

    - name: Upload BuildInfo and Licenses
      uses: actions/upload-artifact@v7
      with:
        name: docs-${{ matrix.lsw_config.author }}-${{ matrix.l-smash_author }}
        path: ${{ github.workspace }}/pub

    - name: Create Cloned Repositories Archive
      run: |
        cd ${{ github.workspace }}
        tar -czf build.tar.gz build

    - name: Upload Cloned Repositories
      uses: actions/upload-artifact@v7
      with:
        name: build-${{ matrix.lsw_config.author }}-${{ matrix.l-smash_author }}
        path: ${{ github.workspace }}/build.tar.gz


  # job 2. Ubuntu 環境で L-SMASH Worksをビルド (AvuUtl, AviUtl ExEdit2, VapourSynth)
  ubuntu-build:
    needs: clone
    env:
      CFLAGS: -O2
      CXXFLAGS: -O2
      INSTALL_PREFIX: ${{ github.workspace }}/lsw
      CMAKE_TOOLCHAIN_PREFIX: ${{ github.workspace }}/cmake_toolchainfile
      MESON_CROSSFILE_PREFIX: ${{ github.workspace }}/meson_lsw_crossfile

    runs-on: ubuntu-24.04
    strategy:
      matrix:
        lsw_config:
          - { author: VFR-maniac, ffmpeg_version: "4.4", ffmpeg_patch: " (patched)", intel: "mfx", ffmpeg_extra_flags: "--enable-avresample" }
          - { author: Mr-Ojii, ffmpeg_version: "7.1", ffmpeg_patch: "", intel: "vpl", ffmpeg_extra_flags: ""}
        l-smash_author: [Mr-Ojii, vimeo]
        cpu_config:
          - { cpu: i686, arch: x86, user_arch: x86, vpx_target: x86-win32-gcc }
          - { cpu: x86_64, arch: x86_64, user_arch: x64, vpx_target: x86_64-win64-gcc }

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # ビルド用ソフトウェアのインストール
    - name: Install depend lib
      run: |
        sudo apt-get update -y
        sudo apt-get install -y autoconf cmake libtool nasm mingw-w64 meson ninja-build pkg-config

    # pkg-configまでcross-prefixがつくので、シンボリックリンクを貼る
    - name: Create pkg-config symbolic link
      run: sudo ln -s /usr/bin/pkg-config /usr/bin/${{ matrix.cpu_config.cpu }}-w64-mingw32-pkg-config

    - name: Download Cloned Repositories
      uses: actions/download-artifact@v7
      with:
        name: build-${{ matrix.lsw_config.author }}-${{ matrix.l-smash_author }}
        path: ${{ github.workspace }}

    - name: Extract Cloned Repositories
      run: |
        cd ${{ github.workspace }}
        tar -xzf build.tar.gz

    # ここから依存ライブラリのインストール
    - name: Install zlib
      run: |
        cd ${{ github.workspace }}/build/zlib
        CROSS_PREFIX=${{ matrix.cpu_config.cpu }}-w64-mingw32- ./configure --static --prefix=${INSTALL_PREFIX}
        make -j$(nproc)
        make install -j$(nproc)

    - name: Install Game Music Emu
      run: |
        cd ${{ github.workspace }}/build/game-music-emu

        # SharedとStaticの2回、ビルドとインストールを行う
        # Shared (FFmpegはSharedをビルドしないければエラーとなる)
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${INSTALL_PREFIX} -DENABLE_UBSAN=OFF -DBUILD_SHARED_LIBS=ON -DCMAKE_TOOLCHAIN_FILE=${CMAKE_TOOLCHAIN_PREFIX}/${{ matrix.cpu_config.cpu }}.cmake
        cmake --build build -j $(nproc)
        cmake --install build --prefix ${INSTALL_PREFIX}

        rm -rf build

        # Static (LSWはStaticをビルドしなければエラーとなる)
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${INSTALL_PREFIX} -DENABLE_UBSAN=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_TOOLCHAIN_FILE=${CMAKE_TOOLCHAIN_PREFIX}/${{ matrix.cpu_config.cpu }}.cmake
        cmake --build build -j $(nproc)
        cmake --install build --prefix ${INSTALL_PREFIX}

    - name: Install dav1d
      run: |
        cd ${{ github.workspace }}/build/dav1d
        meson setup --cross-file=./package/crossfiles/${{ matrix.cpu_config.cpu }}-w64-mingw32.meson --buildtype release --default-library=static -Denable_tests=false --prefix=${INSTALL_PREFIX} build
        ninja -C build
        ninja install -C build

    - name: Install libvpx
      run: |
        cd ${{ github.workspace }}/build/libvpx
        mkdir builds && cd builds
        CROSS=${{ matrix.cpu_config.cpu }}-w64-mingw32- ../configure --target=${{ matrix.cpu_config.vpx_target }} --enable-vp9-highbitdepth --disable-docs --disable-tools --disable-examples --disable-webm-io --disable-vp8-encoder --disable-vp9-encoder --prefix=${INSTALL_PREFIX}
        make -j$(nproc)
        make install -j$(nproc)

    - name: Install nv-codec-headers
      run: |
        cd ${{ github.workspace }}/build/nv-codec-headers
        sudo make install -j$(nproc)

    - name: Install mfx_dispatch
      if: ${{ matrix.lsw_config.intel == 'mfx' }}
      run: |
        cd ${{ github.workspace }}/build/mfx_dispatch
        autoreconf -i
        ./configure --host=${{ matrix.cpu_config.cpu }}-w64-mingw32 --prefix=${INSTALL_PREFIX}
        make -j$(nproc)
        make install -j$(nproc)

    - name: Install libvpl
      if: ${{ matrix.lsw_config.intel == 'vpl' }}
      run: |
        cd ${{ github.workspace }}/build/libvpl
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${CMAKE_TOOLCHAIN_PREFIX}/${{ matrix.cpu_config.cpu }}.cmake" -DBUILD_EXPERIMENTAL=OFF -DBUILD_SHARED_LIBS=OFF -DCXX_LIB=-lstdc++ -DCMAKE_INSTALL_PREFIX="${INSTALL_PREFIX}" .
        cmake --build build -j$(nproc)
        cmake --install build --prefix=${INSTALL_PREFIX}

    - name: Install FFmpeg
      run: |
        cd ${{ github.workspace }}/build/FFmpeg

        PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig ./configure --enable-version3 --disable-hwaccels --disable-encoders --disable-avisynth --disable-doc --disable-network --disable-programs --disable-outdevs --disable-indevs --disable-avfilter --disable-debug --disable-muxers --enable-avcodec --enable-avformat --enable-swresample --enable-swscale --extra-libs="-lpthread" --cross-prefix=${{ matrix.cpu_config.cpu }}-w64-mingw32- --target-os=mingw32 --arch=${{ matrix.cpu_config.arch }} --prefix=${INSTALL_PREFIX} --enable-libdav1d --enable-libvpx --enable-libgme --enable-lib${{ matrix.lsw_config.intel }} ${{ matrix.lsw_config.ffmpeg_extra_flags }}
        make -j$(nproc)
        make install -j$(nproc)

    - name: Install obuparse
      run: |
        cd ${{ github.workspace }}/build/obuparse
        ${{ matrix.cpu_config.cpu }}-w64-mingw32-gcc -O2 -c obuparse.c
        ${{ matrix.cpu_config.cpu }}-w64-mingw32-ar r libobuparse.a obuparse.o
        install obuparse.h ${INSTALL_PREFIX}/include
        install libobuparse.a ${INSTALL_PREFIX}/lib

    - name: Install L-SMASH
      run: |
        cd ${{ github.workspace }}/build/l-smash
        ./configure --cross-prefix=${{ matrix.cpu_config.cpu }}-w64-mingw32- --extra-cflags=-I${INSTALL_PREFIX}/include --extra-ldflags=-L${INSTALL_PREFIX}/lib --prefix=${INSTALL_PREFIX}
        make lib -j$(nproc)
        make install-lib -j$(nproc)

    - name: Install AviSynthPlus
      run: |
        cd ${{ github.workspace }}/build/AviSynthPlus
        # Multiple definitions防止のため、勝手にちょっとだけパッチを当てる
        sed -i 's/MSVC/__MINGW32__/' avs_core/filters/AviSource/avi_source.cpp
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_PLUGINS=OFF -DENABLE_INTEL_SIMD=OFF -DCMAKE_TOOLCHAIN_FILE=${CMAKE_TOOLCHAIN_PREFIX}/${{ matrix.cpu_config.cpu }}.cmake
        cmake --build build -j $(nproc)
        cmake --install build --prefix ${INSTALL_PREFIX}

        REVCOUNT=`git rev-list --count HEAD`
        echo "REV_LIST_COUNT=${REVCOUNT}" >> $GITHUB_OUTPUT
        SHA=`git rev-parse HEAD`
        echo "REV_SHA=${SHA}" >> $GITHUB_OUTPUT

    - name: Install zimg
      run: |
        cd ${{ github.workspace }}/build/zimg
        ./autogen.sh
        ./configure --host=${{ matrix.cpu_config.cpu }}-w64-mingw32 --prefix=${INSTALL_PREFIX}
        make -j$(nproc)
        make install -j$(nproc)

    - name: Install VapourSynth
      run: |
        cd ${{ github.workspace }}/build/vapoursynth
        ./autogen.sh
        CC=${{ matrix.cpu_config.cpu }}-w64-mingw32-gcc-posix CXX=${{ matrix.cpu_config.cpu }}-w64-mingw32-g++-posix PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig ./configure --host=${{ matrix.cpu_config.cpu }}-w64-mingw32 --disable-vsscript --disable-vspipe --disable-python-module --prefix=${INSTALL_PREFIX}
        make -j$(nproc)
        make install -j$(nproc)

    # ここまで依存ライブラリのインストール

    - name: Clone L-SMASH Works
      id: l-smash-works-rev
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works
        echo "REV_LIST_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "REV_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    # ここからLSWのビルド
    # VFR-maniac版はmesonに対応していないため、一時的に除外
    - name: Build L-SMASH Works(AviSynth)
      if: ${{ matrix.lsw_config.author != 'VFR-maniac' }}
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/AviSynth
        # ヘッダファイルの階層問題より、AviSynthのヘッダを一つ上の階層にぶちまける
        mv ${INSTALL_PREFIX}/include/avisynth/* ${INSTALL_PREFIX}/include
        PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig meson setup --prefer-static --cross-file=${MESON_CROSSFILE_PREFIX}/${{ matrix.cpu_config.cpu }}-w64-mingw32.meson build
        ninja -C build

    - name: Build L-SMASH Works(VapourSynth)(meson)
      if: ${{ matrix.lsw_config.author != 'VFR-maniac' }}
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/VapourSynth
        PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig meson setup --prefer-static --cross-file=${MESON_CROSSFILE_PREFIX}/${{ matrix.cpu_config.cpu }}-w64-mingw32.meson build
        ninja -C build

    - name: Build L-SMASH Works(VapourSynth)(makefile)
      if: ${{ matrix.lsw_config.author == 'VFR-maniac' }}
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/VapourSynth
        PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig ./configure --cross-prefix=${{ matrix.cpu_config.cpu }}-w64-mingw32- --extra-cflags=-I/usr/local/include --extra-ldflags="-L/usr/local/lib -static-libgcc -static-libstdc++ -static" --extra-libs="-lpthread"
        make
        mkdir build
        mv libvslsmashsource.so.${{ steps.l-smash-works-rev.outputs.REV_LIST_COUNT }} build/libvslsmashsource.dll


    - name: Build L-SMASH Works(AviUtl ExEdit2)
      if: ${{ matrix.cpu_config.user_arch == 'x64' && matrix.lsw_config.author == 'Mr-Ojii' }}
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/AviUtl2
        PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig ./configure --cross-prefix=${{ matrix.cpu_config.cpu }}-w64-mingw32- --extra-cflags=-I/usr/local/include --extra-ldflags="-L/usr/local/lib -static-libgcc -static-libstdc++ -static" --extra-libs="-lpthread"
        make -j$(nproc)

    - name: Build L-SMASH Works(AviUtl)
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/AviUtl
        PKG_CONFIG_PATH=${INSTALL_PREFIX}/lib/pkgconfig ./configure --cross-prefix=${{ matrix.cpu_config.cpu }}-w64-mingw32- --extra-cflags=-I/usr/local/include --extra-ldflags="-L/usr/local/lib -static-libgcc -static-libstdc++ -static" --extra-libs="-lpthread"
        make -j$(nproc)

    - name: Rename Files(x64)
      if: ${{ matrix.cpu_config.user_arch == 'x64' }}
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/AviUtl
        mv lwinput.aui lwinput64.aui

    # Releaseのためのディレクトリ
    - name: Create pub Directory
      run: |
        cd ${{ github.workspace }}
        mkdir pub

    - name: Copy to pub Directory(VapourSynth)
      run: |
        cd ${{ github.workspace }}
        mkdir pub/VapourSynth && mkdir pub/VapourSynth/${{ matrix.cpu_config.user_arch }}
        cp build/L-SMASH-Works/VapourSynth/build/*.dll pub/VapourSynth/${{ matrix.cpu_config.user_arch }}
        cp build/L-SMASH-Works/VapourSynth/README pub/VapourSynth
        cp build/L-SMASH-Works/VapourSynth/LICENSE pub/VapourSynth


    - name: Copy to pub Directory(AviUtl, x86)
      if: ${{ matrix.cpu_config.user_arch == 'x86' }}
      run: |
        cd ${{ github.workspace }}
        mkdir pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/*.auf pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/*.auc pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/*.aui pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/README pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/README.ja pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/LICENSE pub/AviUtl

    - name: Copy to pub Directory(AviUtl, x64)
      if: ${{ matrix.cpu_config.user_arch == 'x64' }}
      run: |
        cd ${{ github.workspace }}
        mkdir pub/AviUtl
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl/*.aui pub/AviUtl

    - name: Copy to pub Directory(AviUtl Exedit2)
      if: ${{ matrix.cpu_config.user_arch == 'x64' && matrix.lsw_config.author == 'Mr-Ojii' }}
      run: |
        cd ${{ github.workspace }}
        mkdir pub/AviUtl2
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl2/lwinput.aui2 pub/AviUtl2
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl2/README pub/AviUtl2
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl2/README.ja pub/AviUtl2
        cp ${{ github.workspace }}/build/L-SMASH-Works/AviUtl2/LICENSE pub/AviUtl2

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ubuntu-build-${{ matrix.lsw_config.author }}-${{ matrix.l-smash_author }}-${{ matrix.cpu_config.user_arch }}
        path: ${{ github.workspace }}/pub

  # job 3. Windows 環境で L-SMASH Worksをビルド (AviSynth)
  windows-build:
    needs: clone
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/build/L-SMASH-Works/build${{matrix.cpu_config.build_arch }}_msvc
      MSYS2_PATH_TYPE: inherit

    runs-on: windows-latest
    strategy:
      matrix:
        lsw_config:
          - { author: Mr-Ojii, ffmpeg_version: "7.1", ffmpeg_patch: "", intel: "vpl", ffmpeg_extra_flags: ""}
        l-smash_author: [Mr-Ojii]
        cpu_config:
          - { cpu: i686, arch: x86, user_arch: x86, build_arch: 32, sys: mingw32, vpx_target: x86-win32-vs17, ffmpeg_target_os: win32, msvc_platform: Win32, msvc_dir: "Release" }
          - { cpu: x86_64, arch: x86_64, user_arch: x64, build_arch: 64, sys: mingw64, vpx_target: x86_64-win64-vs17, ffmpeg_target_os: win64, msvc_platform: x64, msvc_dir: "x64\\Release" }

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download Cloned Repositories
      uses: actions/download-artifact@v7
      with:
        name: build-${{ matrix.lsw_config.author }}-${{ matrix.l-smash_author }}
        path: ${{ github.workspace }}

    - name: Extract Cloned Repositories
      run: |
        cd ${{ github.workspace }}
        tar -xzf build.tar.gz

    - uses: actions/setup-python@v6

    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja

    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.cpu_config.user_arch }}

    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: ${{ matrix.cpu_config.sys }}
        path-type: inherit
        install: >-
          base-devel
          git
          autotools
          autoconf
          cmake
          meson
          nasm
          yasm
          ninja
          pkgconf

    # 以下 pwsh でのビルド
    - name: Clone L-SMASH-Works
      run: |
        cd ${{ github.workspace }}
        mkdir ${Env:INSTALL_PREFIX}
        mkdir ${Env:INSTALL_PREFIX}/lib
        mkdir ${Env:INSTALL_PREFIX}/include

    - name: Install obuparse
      run: |
        cd ${{ github.workspace }}/build/obuparse
        cl /c /EHsc /O2 /MT obuparse.c
        lib /OUT:obuparse.lib obuparse.obj
        copy obuparse.h ${Env:INSTALL_PREFIX}\include
        copy obuparse.lib ${Env:INSTALL_PREFIX}\lib
        copy obuparse.h ../l-smash
        copy obuparse.lib ../l-smash

    - name: Install l-smash
      run: |
        cd ${{ github.workspace }}/build/l-smash
        msbuild L-SMASH.sln /p:Configuration=Release /p:ConfigurationType=StaticLibrary /p:Platform=${{ matrix.cpu_config.msvc_platform }} /p:TargetFrameworkVersion=v4.8 /p:PlatformToolset=v143
        copy lsmash.h ${Env:INSTALL_PREFIX}\include
        copy ${{ matrix.cpu_config.msvc_dir }}\liblsmash.lib ${Env:INSTALL_PREFIX}\lib

    - name: Install zlib
      run: |
        cd ${{ github.workspace }}/build/zlib
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_GENERATOR_PLATFORM=${{ matrix.cpu_config.msvc_platform }} -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX="${Env:INSTALL_PREFIX}"
        cmake --build build --config Release --parallel
        cmake --install build --config Release --prefix="${Env:INSTALL_PREFIX}"
        move ${Env:INSTALL_PREFIX}\lib\zs.lib ${Env:INSTALL_PREFIX}\lib\zlib.lib

    - name: Install Game Music Emu
      run: |
        cd ${{ github.workspace }}/build/game-music-emu
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_GENERATOR_PLATFORM=${{ matrix.cpu_config.msvc_platform }} -DCMAKE_INSTALL_PREFIX="${Env:INSTALL_PREFIX}" -DENABLE_UBSAN=OFF -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DBUILD_SHARED_LIBS=OFF
        cmake --build build --config Release --parallel
        cmake --install build --config Release --prefix "${Env:INSTALL_PREFIX}"

    - name: Install dav1d
      run: |
        cd ${{ github.workspace }}/build/dav1d
        meson setup --buildtype release --default-library=static -Denable_tests=false -Db_vscrt=mt --prefix="${Env:INSTALL_PREFIX}" build
        ninja -C build
        ninja install -C build
        move ${Env:INSTALL_PREFIX}\lib\libdav1d.a ${Env:INSTALL_PREFIX}\lib\dav1d.lib

    - name: Install libvpl
      if: ${{ matrix.lsw_config.intel == 'vpl' }}
      run: |
        cd ${{ github.workspace }}/build/libvpl
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_GENERATOR_PLATFORM=${{ matrix.cpu_config.msvc_platform }} -DCMAKE_C_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG" -DCMAKE_CXX_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG" -DBUILD_EXPERIMENTAL=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX="${Env:INSTALL_PREFIX}" .
        cmake --build build --config Release --parallel
        cmake --install build --config Release --prefix="${Env:INSTALL_PREFIX}"

    # 以下 msys2 でのビルド
    - name: Install nv-codec-headers
      shell: msys2 {0}
      run: |
        SYG_INSTALL_PREFIX=$(cygpath -u "${INSTALL_PREFIX}")
        cd $(cygpath -u "${{ github.workspace }}")/build/nv-codec-headers
        sed -i "s|/usr/local|${SYG_INSTALL_PREFIX}|" Makefile
        make install -j$(nproc)

    - name: Install libvpx
      shell: msys2 {0}
      run: |
        SYG_INSTALL_PREFIX=$(cygpath -u "${INSTALL_PREFIX}")
        cd $(cygpath -u "${{ github.workspace }}")/build/libvpx
        mkdir builds && cd builds
        ../configure --target=${{ matrix.cpu_config.vpx_target }} --enable-vp9-highbitdepth --disable-docs --disable-tools --disable-examples --disable-webm-io --disable-vp8-encoder --disable-vp9-encoder --prefix=${SYG_INSTALL_PREFIX}
        make -j$(nproc)
        make install -j$(nproc)

    - name: Install FFmpeg
      shell: msys2 {0}
      run: |
        SYG_INSTALL_PREFIX=$(cygpath -u "${INSTALL_PREFIX}")
        cd $(cygpath -u "${{ github.workspace }}")/build/FFmpeg

        # なぜかlibvplはx86ディレクトリ内に展開されるため、一階層上に移動する
        # pkgconfigの記述も修正する
        if [ "${{ matrix.cpu_config.arch }}" = "x86" ]; then
          cp -r ${SYG_INSTALL_PREFIX}/lib/x86/* ${SYG_INSTALL_PREFIX}/lib/
          rm -rf ${SYG_INSTALL_PREFIX}/lib/x86
          sed -i 's|${pcfiledir}/../../../|${pcfiledir}/../../|g' ${SYG_INSTALL_PREFIX}/lib/pkgconfig/vpl.pc
        fi
        sed -i "s|-lvpl|-lvpl -ladvapi32 -lole32|g" ${SYG_INSTALL_PREFIX}/lib/pkgconfig/vpl.pc

        mkdir build && cd build
        PKG_CONFIG_PATH=${SYG_INSTALL_PREFIX}/lib/pkgconfig ../configure --prefix=${SYG_INSTALL_PREFIX} --pkg-config-flags="--static" --extra-ldflags='-static' --enable-version3 --disable-hwaccels --disable-encoders --disable-avisynth --disable-doc --disable-network --disable-programs --disable-outdevs --disable-indevs --disable-avfilter --disable-debug --disable-muxers --enable-avcodec --enable-avformat --enable-swresample --enable-swscale --target-os=${{ matrix.cpu_config.ffmpeg_target_os }} --arch=${{ matrix.cpu_config.arch }} --toolchain=msvc --enable-libdav1d --enable-libvpx --enable-libgme --enable-libvpl
        make -j$(nproc)
        make install -j$(nproc)

    # libvplなどでpc構造が変だったりするため、ログ出しとく
    - name: Echo FFmpeg log
      shell: msys2 {0}
      if: ${{ !cancelled() }}
      run: |
        SYG_INSTALL_PREFIX=$(cygpath -u "${INSTALL_PREFIX}")
        cd $(cygpath -u "${{ github.workspace }}")/build

        echo "--- lib ---"
        ls -l ${SYG_INSTALL_PREFIX}/lib
        if [ -d "${SYG_INSTALL_PREFIX}/lib/Win32" ]; then
          echo "--- lib/Win32 ---"
          ls -l ${SYG_INSTALL_PREFIX}/lib/Win32
        fi
        if [ -d "${SYG_INSTALL_PREFIX}/lib/x86" ]; then
          echo "--- lib/x86 ---"
          ls -l ${SYG_INSTALL_PREFIX}/lib/x86
        fi
        if [ -d "${SYG_INSTALL_PREFIX}/lib/x64" ]; then
          echo "--- lib/x64 ---"
          ls -l ${SYG_INSTALL_PREFIX}/lib/x64
        fi
        echo "--- lib/pkgconfig ---"
        ls -l ${SYG_INSTALL_PREFIX}/lib/pkgconfig
        echo "--- cat vpl.pc ---"
        cat ${SYG_INSTALL_PREFIX}/lib/pkgconfig/vpl.pc
        echo "--- cat ffbuild/config.log ---"
        cd FFmpeg/build
        cat ffbuild/config.log

    # AviSynth 用 L-SMASH-Works のビルド
    - name: Build L-SMASH Works(AviSynth)
      run: |
        cd ${{ github.workspace }}/build/L-SMASH-Works/AviSynth
        @'
        #pragma comment( lib, "Ws2_32.lib" )
        #pragma comment( lib, "Bcrypt.lib" )
        #pragma comment( lib, "liblsmash.lib" )
        #pragma comment( lib, "libavutil.a" )
        #pragma comment( lib, "libavcodec.a" )
        #pragma comment( lib, "libavformat.a" )
        #pragma comment( lib, "libswscale.a" )
        #pragma comment( lib, "libswresample.a" )
        #pragma comment( lib, "zlib.lib" )
        #pragma comment( lib, "obuparse.lib" )
        #pragma comment( lib, "dav1d.lib" )
        #pragma comment( lib, "gme.lib" )
        #pragma comment( lib, "vpl.lib" )
        '@ > exlibs.cpp
        msbuild LSMASHSourceVCX.sln /p:Configuration=Release /p:Platform=${{ matrix.cpu_config.user_arch }} /p:PlatformToolset=v143

    - name: Create pub Directory and Copy Files
      run: |
        cd ${{ github.workspace }}
        mkdir -p pub/AviSynth/${{ matrix.cpu_config.user_arch }}
        cp build/L-SMASH-Works/AviSynth/${{ matrix.cpu_config.msvc_dir }}/LSMASHSource.dll pub/AviSynth/${{ matrix.cpu_config.user_arch }}
        cp build/L-SMASH-Works/AviSynth/README pub/AviSynth
        cp build/L-SMASH-Works/AviSynth/LICENSE pub/AviSynth

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: windows-build-${{ matrix.lsw_config.author }}-${{ matrix.l-smash_author }}-${{ matrix.cpu_config.user_arch }}
        path: ${{ github.workspace }}/pub


